<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enquiry sent — Vividex</title>
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root { --cyan:#00d9ff; --blue:#005cff; --ink:#05070b; --muted:#8d98aa; --white:#ffffff; }
    *{ box-sizing:border-box; margin:0; padding:0; }
    body {
      font-family:'Outfit',sans-serif; background:var(--ink); color:var(--white);
      min-height:100vh; display:grid; place-items:center; padding:28px;
      background-image:
        radial-gradient(circle at 70% 30%, rgba(0,217,255,0.14), transparent 32%),
        radial-gradient(circle at 30% 70%, rgba(0,92,255,0.16), transparent 30%);
    }
    .panel {
      width:min(100%,680px); padding:clamp(32px,6vw,56px);
      border:1px solid rgba(0,217,255,0.22); border-radius:16px;
      background:rgba(0,0,0,0.5); text-align:center;
      box-shadow:0 40px 100px rgba(0,92,255,0.2);
    }
    .check {
      width:64px; height:64px; border-radius:50%;
      background:linear-gradient(135deg,var(--cyan),var(--blue));
      display:flex; align-items:center; justify-content:center;
      margin:0 auto 28px; font-size:1.6rem;
    }
    .eyebrow {
      font-size:0.72rem; font-weight:700; text-transform:uppercase;
      letter-spacing:0.18em; color:var(--cyan); margin-bottom:14px;
    }
    h1 {
      font-family:'Syne',sans-serif; font-size:clamp(2.2rem,5vw,3.8rem);
      font-weight:800; line-height:0.95; margin-bottom:20px;
    }
    p { color:var(--muted); line-height:1.72; font-size:1rem; max-width:480px; margin:0 auto 32px; }
    a {
      display:inline-flex; align-items:center; justify-content:center;
      padding:12px 24px; border-radius:8px;
      background:linear-gradient(135deg,var(--cyan),var(--blue));
      color:var(--white); font-weight:600; font-size:0.93rem;
      text-decoration:none;
    }
  </style>
</head>
<body>
  <div class="panel">
    <div class="check">✓</div>
    <p class="eyebrow">Enquiry received</p>
    <h1>We'll be in touch.</h1>
    <p>Thanks for reaching out. We'll come back to you within one business day to talk through what you're building.</p>
    <a href="/">Back to Vividex</a>
  </div>
</body>
</html>
